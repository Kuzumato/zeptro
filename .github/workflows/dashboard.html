<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dashboard - Zeptro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .login-container, .dashboard-container {
            max-width: 300px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        button {
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container" id="login-section">
        <h2>Login</h2>
        <p class="error" id="error-msg"></p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="dashboard-container hidden" id="dashboard">
        <h2>Welcome to Zeptro</h2>
        <p id="welcome-user"></p>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            if (user === "admin" && pass === "1234") {  
                localStorage.setItem("user", user);
                showDashboard();
            } else {
                document.getElementById("error-msg").innerText = "Invalid username or password!";
            }
        }

        function showDashboard() {
            var storedUser = localStorage.getItem("user");
            if (storedUser) {
                document.getElementById("login-section").classList.add("hidden");
                document.getElementById("dashboard").classList.remove("hidden");
                document.getElementById("welcome-user").innerText = "User: " + storedUser;
            }
        }

        function logout() {
            localStorage.removeItem("user");
            window.location.reload();
        }

        showDashboard();  // Check user session on page load
    </script>
</body>
</html>
